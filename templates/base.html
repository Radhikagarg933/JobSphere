<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Job Board Platform{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --brand-indigo: #4f46e5;
            --brand-violet: #7c3aed;
            --brand-cyan: #06b6d4;
            --text-main: #0f172a;
            --surface: rgba(255, 255, 255, 0.8);
        }

        * {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Poppins', sans-serif;
            color: var(--text-main);
            background:
                radial-gradient(1000px 450px at 0% -5%, rgba(79, 70, 229, 0.16), transparent 60%),
                radial-gradient(900px 420px at 100% 0%, rgba(6, 182, 212, 0.14), transparent 60%),
                linear-gradient(180deg, #f8faff 0%, #eef2ff 45%, #f8fafc 100%);
            min-height: 100vh;
            position: relative;
        }

        .page-shell {
            position: relative;
            overflow-x: hidden;
        }

        .page-shell::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: -1;
            background-image:
                linear-gradient(rgba(99, 102, 241, 0.055) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99, 102, 241, 0.055) 1px, transparent 1px);
            background-size: 46px 46px;
            mask-image: radial-gradient(circle at center, black 35%, transparent 88%);
            opacity: 0.35;
        }

        .content-wrap {
            padding-top: 4.5rem;
        }

        .glass-panel {
            background: var(--surface);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.75);
            box-shadow: 0 12px 34px rgba(79, 70, 229, 0.08);
            border-radius: 1rem;
        }

        .premium-section {
            border-radius: 1.25rem;
            border: 1px solid rgba(199, 210, 254, 0.8);
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.88), rgba(255, 255, 255, 0.7));
            box-shadow: 0 20px 42px rgba(30, 41, 59, 0.09);
        }

        .message-alert {
            margin: 0.65rem auto 0;
            max-width: 72rem;
            border-radius: 0.95rem;
            border-left: 4px solid transparent;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.07);
        }

        .message-alert.success {
            background: rgba(16, 185, 129, 0.12);
            border-left-color: #10b981;
            color: #065f46;
        }

        .message-alert.error {
            background: rgba(239, 68, 68, 0.12);
            border-left-color: #ef4444;
            color: #7f1d1d;
        }

        .message-alert.warning {
            background: rgba(245, 158, 11, 0.16);
            border-left-color: #f59e0b;
            color: #78350f;
        }

        .message-alert.info {
            background: rgba(59, 130, 246, 0.12);
            border-left-color: #3b82f6;
            color: #1e3a8a;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body class="page-shell">
    {% include 'includes/header.html' %}
    
    {% if messages %}
    <div class="content-wrap px-4 sm:px-6">
        {% for message in messages %}
        <div class="message-alert {% if 'error' in message.tags %}error{% elif 'warning' in message.tags %}warning{% elif 'success' in message.tags %}success{% else %}info{% endif %} p-4" role="alert">
            <p>{{ message }}</p>
        </div>
        {% endfor %}
    </div>
    {% endif %}

    {% block content %}{% endblock %}
    
    {% include 'includes/footer.html' %}
    
    {% block extra_js %}{% endblock %}
</body>
</html>
